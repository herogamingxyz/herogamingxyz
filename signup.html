<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroVerse Sign Up</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1VMS2D4KP5"></script>

<script>
window.dataLayer = window.dataLayer || [];

function gtag(){
dataLayer.push(arguments);
}

gtag('js', new Date());

gtag('config', 'G-1VMS2D4KP5');
</script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#0a0a0a,#001f3f);
}

.signup-box{
width:420px;
max-width:90%;
background:rgba(20,20,20,0.95);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,0.2);
}

.logo{
font-size:42px;
font-weight:bold;
color:#00ffff;
margin-bottom:10px;
text-shadow:0 0 15px #00ffff;
}

.subtitle{
color:#aaa;
margin-bottom:25px;
}

.input-box{
width:100%;
padding:15px;
margin:10px 0;
border:none;
outline:none;
border-radius:12px;
background:#111;
color:white;
font-size:16px;
}

.input-box:focus{
box-shadow:0 0 15px #00ffff;
}

.signup-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#00ffff;
color:black;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.signup-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

.login-link{
margin-top:20px;
}

.login-link a{
color:#00ffff;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="signup-box">

<div class="logo">HeroVerse</div>

<div class="subtitle">
Create Your Hero Account
</div>

<input type="text" placeholder="Username" class="input-box" id="username">

<input type="email" placeholder="Email" class="input-box" id="email">

<input type="password" placeholder="Password" class="input-box" id="password">

<input type="password" placeholder="Confirm Password" class="input-box" id="confirmPassword">

<button class="signup-btn" id="signupBtn">
CREATE ACCOUNT
</button>

<div class="login-link">
Already have an account?
<br><br>
<a href="login.html">Login Here</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",
authDomain: "hero-verse-67e33.firebaseapp.com",
projectId: "hero-verse-67e33",
storageBucket: "hero-verse-67e33.firebasestorage.app",
messagingSenderId: "227494840218",
appId: "1:227494840218:web:c0d0f311a6e75737eadc23"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("signupBtn").addEventListener("click", () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const confirmPassword =
document.getElementById("confirmPassword").value;

if(password !== confirmPassword){
alert("Passwords do not match!");
return;
}

createUserWithEmailAndPassword(auth,email,password)
.then(async (userCredential)=>{

const user = userCredential.user;

const username =
document.getElementById("username").value;

await setDoc(
doc(db,"users",user.uid),
{
username: username,
email: email,
joinDate: new Date().toISOString()
}
);

alert("Account Created Successfully!");

window.location.href="login.html";

})

.catch((error)=>{

alert(error.message);

});

});

</script>

</body>
</html>
