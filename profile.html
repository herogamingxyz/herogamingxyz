<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Verse Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* MAIN WRAPPER */
.profile-wrapper{
max-width:1000px;
margin:40px auto;
display:flex;
gap:20px;
padding:20px;
}

/* LEFT */
.left{
width:30%;
background:#1b1b1b;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,255,153,0.15);
}

.left img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid #00ff99;
margin-bottom:10px;
}

.left h2{
color:#00ff99;
margin:10px 0;
font-size:22px;
}

.badge{
display:inline-block;
padding:6px 14px;
background:#00ff99;
color:black;
border-radius:20px;
font-weight:bold;
margin-top:10px;
}

/* RIGHT */
.right{
width:70%;
display:flex;
flex-direction:column;
gap:20px;
}

/* CARD */
.card{
background:#1b1b1b;
padding:20px;
border-radius:18px;
box-shadow:0 0 15px rgba(0,255,153,0.08);
}

/* TITLE */
.title{
color:#00ff99;
margin-bottom:15px;
font-size:18px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.stat-box{
background:#111;
padding:15px;
border-radius:12px;
text-align:center;
}

.stat-box h3{
color:#00ff99;
margin:0;
font-size:22px;
}

/* XP BAR */
.xp-bar{
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.xp-fill{
height:100%;
width:40%;
background:#00ff99;
}

/* INFO */
.small{
color:#aaa;
font-size:14px;
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 20px;
background:#00ff99;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="profile-wrapper">

<!-- LEFT PANEL -->
<div class="left">

<img id="profilePic" src="default.png">

<h2 id="username">Loading...</h2>

<p id="email" class="small"></p>

<div class="badge" id="badge">New Gamer</div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<div class="card">

<div class="title">🎮 Gaming Stats</div>

<div class="stats">

<div class="stat-box">
<h3 id="gamesViewed">0</h3>
<p>Games Viewed</p>
</div>

<div class="stat-box">
<h3 id="downloads">0</h3>
<p>Downloads</p>
</div>

</div>

</div>

<div class="card">

<div class="title">⚡ XP Progress</div>

<p>Level: <span id="level">1</span></p>

<div class="xp-bar">
<div class="xp-fill" id="xpFill"></div>
</div>

</div>

<div class="card">

<div class="title">🕹️ Activity</div>

<p class="small">Last Game: <span id="lastGame">None</span></p>

<p class="small">Last Download: <span id="lastDownload">None</span></p>

</div>

<button>⚙️ Edit Profile</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"hero-verse-67e33.firebaseapp.com",
projectId:"hero-verse-67e33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()) return;

const u = snap.data();

// LEFT
document.getElementById("username").innerText = u.username || "User";
document.getElementById("email").innerText = user.email;

if(u.photoURL){
document.getElementById("profilePic").src = u.photoURL;
}

// STATS
document.getElementById("gamesViewed").innerText = u.gamesViewed || 0;
document.getElementById("downloads").innerText = u.downloads || 0;

// XP + LEVEL
let xp = u.xp || 0;
let level = Math.floor(xp / 100) + 1;

document.getElementById("level").innerText = level;

document.getElementById("xpFill").style.width = (xp % 100) + "%";

// BADGE
let badge = "New Gamer";

if(level >= 10) badge = "Pro Gamer";
if(level >= 25) badge = "Legend Gamer";

document.getElementById("badge").innerText = badge;

// ACTIVITY
document.getElementById("lastGame").innerText = u.lastGame || "None";
document.getElementById("lastDownload").innerText = u.lastDownload || "None";

});

</script>

</body>
</html>
