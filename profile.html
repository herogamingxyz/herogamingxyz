<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Profile | Hero Verse</title><link rel="icon" type="image/png" href="hero.gaming.jpg"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
padding:20px;
}

.profile-container{
max-width:900px;
margin:30px auto;
}

.profile-card{
background:#171717;
border-radius:25px;
padding:30px;
box-shadow:0 0 25px rgba(0,255,153,.12);
}

.top-section{
display:flex;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.profile-pic{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
border:4px solid #00ff99;
flex-shrink:0;
}

.profile-pic img{
width:100%;
height:100%;
object-fit:cover;
}

.profile-info{
flex:1;
min-width:250px;
}

.profile-info h1{
color:#00ff99;
font-size:34px;
margin-bottom:10px;
}

.bio{
color:#cfcfcf;
line-height:1.6;
margin-bottom:12px;
}

.hero-id{
color:#888;
font-size:14px;
}

.profile-details{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.detail-box{
background:#111;
padding:20px;
border-radius:18px;
}

.detail-title{
color:#00ff99;
font-size:15px;
margin-bottom:8px;
}

.detail-value{
font-size:18px;
color:#ddd;
word-break:break-word;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

.stat-box{
background:#111;
padding:25px;
border-radius:18px;
text-align:center;
}

.stat-box h2{
font-size:32px;
color:#00ff99;
margin-bottom:8px;
}

.stat-box p{
color:#bbb;
}

.buttons{
margin-top:30px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:14px 24px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:.3s;
}

.edit-btn{
background:#00ff99;
color:black;
}

.logout-btn{
background:#ff4444;
color:white;
}

.btn:hover{
transform:scale(1.05);
}

@media(max-width:768px){

.profile-details{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr;
}

.top-section{
flex-direction:column;
text-align:center;
}

}

</style></head><body><div class="profile-container"><div class="profile-card"><div class="top-section"><div class="profile-pic"><img
id="profileImage"
src="https://i.ibb.co/4pDNDk1/avatar.png">

</div><div class="profile-info"><h1 id="username">
Loading...
</h1><p class="bio" id="bio">
Loading bio...
</p><p class="hero-id" id="heroId">
Hero ID
</p></div></div><div class="profile-details"><div class="detail-box"><div class="detail-title">
📧 Email
</div><div class="detail-value" id="email">
Loading...
</div></div><div class="detail-box"><div class="detail-title">
🌍 Country
</div><div class="detail-value" id="country">
Loading...
</div></div><div class="detail-box"><div class="detail-title">
🎮 Favourite Game
</div><div class="detail-value" id="favoriteGame">
Loading...
</div></div><div class="detail-box"><div class="detail-title">
📅 Join Date
</div><div class="detail-value" id="joinDate">
Loading...
</div></div></div><div class="stats"><div class="stat-box"><h2 id="downloads">
0
</h2><p>
Downloads
</p></div><div class="stat-box"><h2 id="uploads">
0
</h2><p>
Uploads
</p></div></div><div class="buttons"><button
class="btn edit-btn"
onclick="window.location.href='edit-profile.html'">

✏️ Edit Profile

</button><button
class="btn logout-btn"
id="logoutBtn">

🚪 Logout

</button></div></div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";

return;

}

document.getElementById("email").innerText =
user.email;

document.getElementById("heroId").innerText =
"Hero ID : " +
user.uid.substring(0,8).toUpperCase();

const userRef =
doc(db,"users",user.uid);

const snap =
await getDoc(userRef);

if(snap.exists()){

const data =
snap.data();
document.getElementById("username").innerText =
data.username || "Hero User";

document.getElementById("bio").innerText =
data.bio || "No bio added yet.";

document.getElementById("country").innerText =
data.country || "India";

document.getElementById("favoriteGame").innerText =
data.favoriteGame || "Minecraft";

document.getElementById("joinDate").innerText =
data.joinDate || "Unknown";

document.getElementById("downloads").innerText =
data.downloads || 0;

document.getElementById("uploads").innerText =
data.uploads || 0;

if(data.photoURL){

document.getElementById("profileImage").src =
data.photoURL;

}

}

});

document.getElementById("logoutBtn")
.addEventListener("click",()=>{

signOut(auth).then(()=>{

window.location.href="index.html";

});

});

</script>

</body>

</html>
