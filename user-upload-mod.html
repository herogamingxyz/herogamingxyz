<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Upload Your Mod</title><style>

body{
background:#0f0f0f;
font-family:Arial,sans-serif;
margin:0;
padding:0;
color:white;
}

.container{
max-width:900px;
margin:50px auto;
padding:30px;
background:#1b1b1b;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,153,0.2);
}

h1{
text-align:center;
color:#00ff99;
margin-bottom:10px;
}

.rules{
background:#111;
padding:15px;
border-radius:12px;
margin-bottom:25px;
line-height:1.8;
color:#ccc;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#00ff99;
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.02);
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style></head><body><div class="container"><h1>
📤 Upload Your Minecraft Mod
</h1><div class="rules">⚠ Upload Rules

<br><br>

• Upload only safe Minecraft mods

<br>• No malware or harmful files

<br>• Give proper credits

<br>• Use direct download links

<br>• Hero Verse reviews every submission manually

</div><label>
Mod Title
</label><input
type="text"
id="title"
placeholder="Enter Mod Title">

<label>
Thumbnail
</label><input
type="file"
id="thumbnailFile"
accept="image/*">

<label>
Description
</label><textarea
id="description"
placeholder="Describe your mod"></textarea><label>
Features
</label><textarea
id="features"
placeholder="Mod Features"></textarea><label>
Installation Guide
</label><textarea
id="installation"
placeholder="Installation Guide"></textarea><label>
Download Link
</label><input
type="text"
id="download"
placeholder="Google Drive, MediaFire, Dropbox, Modrinth etc">

<label>
Credits
</label><textarea
id="credits"
placeholder="Credits"></textarea><button id="submitBtn">Submit Mod

</button><div id="status"></div></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

async function uploadToImgBB(file){

const apiKey =
"4b1fc62b168482ae1cdd10329d4ed235";

const formData = new FormData();

formData.append("image", file);

const response = await fetch(
`https://api.imgbb.com/1/upload?key=${apiKey}`,
{
method:"POST",
body:formData
}
);

const data = await response.json();

return data.data.display_url;

  }

document
.getElementById("submitBtn")
.addEventListener("click", async()=>{

const title =
document.getElementById("title").value;

const thumbnailFile =
document.getElementById("thumbnailFile").files[0];

const description =
document.getElementById("description").value;

const features =
document.getElementById("features").value;

const installation =
document.getElementById("installation").value;

const download =
document.getElementById("download").value;

const user = auth.currentUser;

if(!user){
alert("Please Login First");
return;
}

const credits =
document.getElementById("credits").value;

if(
!title ||
!description ||
!download
){

alert("Please Fill Required Fields");

return;

}

try{

const userDoc = await getDoc(doc(db,"users",user.uid));

const userData = userDoc.data();

const creator = userData.username;

document.getElementById("status").innerHTML =
"⏳ Uploading...";

const thumbnail =
thumbnailFile
? await uploadToImgBB(thumbnailFile)
: "";

await addDoc(collection(db,"user_submissions"),{

title: title,
thumbnail: thumbnail,
description: description,
features: features,
installation: installation,
download: download,

creatorUid: user.uid,
creatorName: creator,

credits: credits,
status: "pending",

createdAt: new Date().toISOString(),

uid: user.uid,
email: user.email

});

document.getElementById("status").innerHTML =
"✅ Mod Submitted Successfully";

document.getElementById("title").value="";
document.getElementById("thumbnailFile").value="";
document.getElementById("description").value="";
document.getElementById("features").value="";
document.getElementById("installation").value="";
document.getElementById("download").value="";
document.getElementById("creator").value="";
document.getElementById("credits").value="";

}
catch(error){

console.log(error);

document.getElementById("status").innerHTML =
"❌ Error Submitting Mod";

}

});

  </script>

</body>
</html>
