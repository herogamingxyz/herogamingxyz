<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Review Panel</title>
<style>
body{background:#0f0f0f;color:#fff;font-family:Arial;padding:20px}
h1{text-align:center;color:#00ff99}
.card{background:#1b1b1b;padding:20px;border-radius:14px;margin:20px 0}
img{max-width:350px;width:100%;border-radius:10px}
button{padding:10px 18px;margin:8px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.approve{background:#00ff99}.reject{background:#ff4444;color:#fff}
</style>
</head>
<body>
<h1>Pending Mod Reviews</h1>
<div id="modsContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
getFirestore,collection,getDocs,addDoc,deleteDoc,doc,updateDoc,increment
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",
authDomain:"hero-verse-67e33.firebaseapp.com",
projectId:"hero-verse-67e33",
storageBucket:"hero-verse-67e33.firebasestorage.app",
messagingSenderId:"227494840218",
appId:"1:227494840218:web:c0d0f311a6e75737eadc23"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const container=document.getElementById("modsContainer");

onAuthStateChanged(auth,async(user)=>{
 if(!user){location.href="login.html";return;}
 if(user.email!=="herogamingxyzyt@gmail.com"){
   alert("Access Denied");
   location.href="index.html";
   return;
 }
 loadMods();
});

async function loadMods(){
 container.innerHTML="";
 const snap=await getDocs(collection(db,"user_submissions"));
 snap.forEach(d=>{
   const m=d.data();
   container.innerHTML+=`
   <div class="card">
   <h2>${m.title}</h2>
   <img src="${m.thumbnail||""}">
   <p><b>Creator:</b> ${m.creatorName||"Unknown"}</p>
   <p><b>Description:</b><br>${m.description||""}</p>
   <p><b>Download:</b> ${m.download||""}</p>
   <button class="approve" onclick="approveMod('${d.id}')">Approve</button>
   <button class="reject" onclick="rejectMod('${d.id}')">Reject</button>
   </div>`;
 });
}

window.approveMod=async(id)=>{
 const snap=await getDocs(collection(db,"user_submissions"));
 for(const ds of snap.docs){
   if(ds.id!==id) continue;
   const m=ds.data();

   await addDoc(collection(db,"mods"),{
     creatorId:m.uid,
     creatorUid:m.creatorUid,
     creatorName:m.creatorName,
     creatorEmail:m.email,
     title:m.title,
     image1:m.thumbnail,
     description:m.description,
     features:m.features,
     installation:m.installation,
     download:m.download,
     credits:m.credits,
     image2:"",
     image3:"",
     createdAt:new Date().toISOString()
   });

   await updateDoc(doc(db,"users",m.creatorUid),{
      uploads:increment(1),
      isCreator:true,
      creatorSince:new Date().toISOString()
   });

   await deleteDoc(doc(db,"user_submissions",id));
   alert("Approved");
   loadMods();
   break;
 }
}

window.rejectMod=async(id)=>{
 await deleteDoc(doc(db,"user_submissions",id));
 alert("Rejected");
 loadMods();
}
</script>
</body>
</html>
