<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Verse Product Admin</title>

<style>

body{
background:#0f0f0f;
font-family:Arial,sans-serif;
color:white;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:40px auto;
padding:30px;
background:#1b1b1b;
border-radius:20px;
}

h1{
text-align:center;
color:#00ff99;
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-weight:bold;
}

input,
textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
box-sizing:border-box;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Hero Verse Product Admin</h1>

<label>Product Title</label>
<input type="text" id="title">

<label>Product Image</label>
<input type="file" id="imageFile">

<label>Description</label>
<textarea id="description"></textarea>

<label>Affiliate Link</label>
<input type="text" id="affiliateLink">

<button id="publishBtn">
🚀 Publish Product
</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function uploadToImgBB(file){

const apiKey =
"4b1fc62b168482ae1cdd10329d4ed235";

const formData = new FormData();

formData.append("image", file);

const response = await fetch(
`https://api.imgbb.com/1/upload?key=${apiKey}`,
{
method:"POST",
body:formData
}
);

const data = await response.json();

return data.data.display_url;

}

document
.getElementById("publishBtn")
.addEventListener("click", async()=>{

try{

document.getElementById("status").innerHTML =
"⏳ Uploading Product...";

const title =
document.getElementById("title").value;

const description =
document.getElementById("description").value;

const affiliateLink =
document.getElementById("affiliateLink").value;

const imageFile =
document.getElementById("imageFile").files[0];

if(
!title ||
!description ||
!affiliateLink ||
!imageFile
){
alert("Fill all fields");
return;
}

const image =
await uploadToImgBB(imageFile);

await addDoc(
collection(db,"products"),
{

title,
description,
affiliateLink,
image,

createdAt:new Date().toISOString()

}
);

document.getElementById("status").innerHTML =
"✅ Product Published Successfully";

}catch(error){

console.error(error);

document.getElementById("status").innerHTML =
"❌ Upload Failed";

}

});

</script>

</body>
</html>
