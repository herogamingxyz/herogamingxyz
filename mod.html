<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Hero Verse Mod</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

h1{
color:#00ff99;
}

.download-btn{
display:inline-block;
padding:12px 20px;
background:#00ff99;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<img id="coverImage">

<h1 id="title">Loading...</h1>

<p id="description"></p>
<img id="image2">

<h2>Installation Guide</h2>

<p id="feature1"></p>

<img id="image3">

<h2>Downloads</h2>

<a id="downloadBtn2"
class="download-btn"
target="_blank">
Download Pack 2
</a>

<br><br>

<a id="downloadBtn3"
class="download-btn"
target="_blank">
Download Pack 3
</a>

<h2>Credits</h2>

<p id="credits"></p>

<a id="downloadBtn"
class="download-btn"
target="_blank">
Download
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const params =
new URLSearchParams(window.location.search);

const id = params.get("id");

const docRef = doc(db,"mods",id);

const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const mod = docSnap.data();

document.getElementById("title").innerText =
mod.title;

document.getElementById("description").innerText =
mod.description;

document.getElementById("coverImage").src =
mod.image1;

document.getElementById("downloadBtn").href =
mod.download;

document.getElementById("image2").src =
mod.image2;

document.getElementById("image3").src =
mod.image3;

document.getElementById("feature1").innerText =
mod.installation;

document.getElementById("downloadBtn2").href =
mod.download2;

document.getElementById("downloadBtn3").href =
mod.download3;

document.getElementById("credits").innerText =
mod.credits;

}

</script>

</body>
</html>
