<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroVerse Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#0a0a0a,#001f3f);
overflow:hidden;
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#00ffff;
border-radius:50%;
opacity:.5;
animation:float 15s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

.password-wrapper{
position:relative;
}

.eye-btn{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#00ffff;
cursor:pointer;
font-size:18px;
}

.login-box{
width:400px;
max-width:90%;
background:rgba(20,20,20,0.95);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,0.2);
animation:fadeIn 1s ease;
}

.logo{
font-size:42px;
font-weight:bold;
color:#00ffff;
margin-bottom:10px;
text-shadow:0 0 15px #00ffff;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

.input-box{
width:100%;
padding:15px;
margin:10px 0;
border:none;
outline:none;
border-radius:12px;
background:#111;
color:white;
font-size:16px;
}

.input-box:focus{
box-shadow:0 0 15px #00ffff;
}

.login-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#00ffff;
color:black;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

.links{
margin-top:20px;
}

.links a{
color:#00ffff;
text-decoration:none;
font-size:14px;
}

.links a:hover{
text-decoration:underline;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">HeroVerse</div>

<div class="subtitle">
Powered by herogamingxyz
</div>

<input type="email" placeholder="Email" class="input-box">

<div class="password-wrapper">
<input type="password" id="password" placeholder="Password" class="input-box">
<button class="eye-btn" onclick="togglePassword()">👁</button>
</div>

<button class="login-btn">
LOGIN
</button>

<div class="links">
<a href="#">Forgot Password?</a>
<br><br>
<a href="signup.html">Create Account</a>
</div>

</div>

<script>
function togglePassword(){
const password=document.getElementById("password");

if(password.type==="password"){
password.type="text";
}else{
password.type="password";
}
}

for(let i=0;i<25;i++){
const particle=document.createElement("div");
particle.classList.add("particle");

particle.style.left=Math.random()*100+"vw";
particle.style.animationDelay=Math.random()*15+"s";

document.body.appendChild(particle);
}
</script>

</body>
  </html>
