<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaming Products</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

h1{
text-align:center;
color:#00ff99;
margin-top:40px;
font-size:50px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:40px;
}

.card{
background:#1b1b1b;
width:300px;
border-radius:15px;
overflow:hidden;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #00ff99;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:20px;
}

.content h2{
color:#00ff99;
margin-bottom:15px;
}

.content p{
color:#ccc;
line-height:1.7;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#00ff99;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00ff99;
}

</style>

</head>

<body>

<h1>
Gaming Products
</h1>

<section class="products">

<section class="products" id="productsContainer">

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const productsContainer =
document.getElementById("productsContainer");

getDocs(collection(db,"products"))
.then((snapshot)=>{

snapshot.forEach((docu)=>{

const p = docu.data();

productsContainer.innerHTML += `

<div class="card">

<img src="${p.image}">

<div class="content">

<h2>${p.title}</h2>

<p>${p.description}</p>

<a href="${p.affiliateLink}"
target="_blank"
class="btn">

Buy Now

</a>

</div>

</div>
`;

});

});

</script>

</body>
</html>
