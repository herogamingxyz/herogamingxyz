<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">

</style></head><body><div class="container"><h1>
📰 Hero Verse Article Admin
</h1><label>Article Title</label>
<input type="text" id="title">

<label>Cover Image</label>
<input type="file" id="coverImageFile">

<label>Short Description</label>

<textarea id="shortDescription"></textarea><label>Article Style</label>

<select id="style"><option value="news">News</option><option value="tutorial">Tutorial</option><option value="review">Review</option><option value="blog">Blog</option></select><label>Heading 1</label>
<input type="text" id="heading1">

<label>Paragraph 1</label>

<textarea id="paragraph1"></textarea><label>Image 1</label>
<input type="file" id="image1File">

<label>Heading 2</label>
<input type="text" id="heading2">

<label>Paragraph 2</label>

<textarea id="paragraph2"></textarea><label>Image 2</label>
<input type="file" id="image2File">

<label>Heading 3</label>
<input type="text" id="heading3">

<label>Paragraph 3</label>

<textarea id="paragraph3"></textarea><label>Image 3</label>
<input type="file" id="image3File">

<label>Conclusion</label>

<textarea id="conclusion"></textarea><label>Credits</label>

<textarea id="credits"></textarea><label>Category</label>

<select id="category"><option value="minecraft">
Minecraft
</option><option value="gaming">
Gaming
</option><option value="technology">
Technology
</option><option value="guides">
Guides
</option><option value="updates">
Updates
</option></select><button id="publishBtn">
🚀 Publish Article
</button><div id="status">
  
</div>

</div>

<script type="module">

getAuth,

}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

async function uploadToImgBB(file){

const apiKey =
"4b1fc62b168482ae1cdd10329d4ed235";

const formData = new FormData();

formData.append("image", file);

const response = await fetch(
`https://api.imgbb.com/1/upload?key=${apiKey}`,
{
method:"POST",
body:formData
}
);

const data = await response.json();

return data.data.display_url;

}

document
.getElementById("publishBtn")
.addEventListener("click", async()=>{

const title =
document.getElementById("title").value;

const shortDescription =
document.getElementById("shortDescription").value;

const style =
document.getElementById("style").value;

const category =
document.getElementById("category").value;

const heading1 =
document.getElementById("heading1").value;

const paragraph1 =
document.getElementById("paragraph1").value;

const heading2 =
document.getElementById("heading2").value;

const paragraph2 =
document.getElementById("paragraph2").value;

const heading3 =
document.getElementById("heading3").value;

const paragraph3 =
document.getElementById("paragraph3").value;

const conclusion =
document.getElementById("conclusion").value;

const credits =
document.getElementById("credits").value;

const coverImageFile =
document.getElementById("coverImageFile").files[0];

const image1File =
document.getElementById("image1File").files[0];

const image2File =
document.getElementById("image2File").files[0];

const image3File =
document.getElementById("image3File").files[0];

const coverImage =
coverImageFile
? await uploadToImgBB(coverImageFile)
: "";

const image1 =
image1File
? await uploadToImgBB(image1File)
: "";

const image2 =
image2File
? await uploadToImgBB(image2File)
: "";

const image3 =
image3File
? await uploadToImgBB(image3File)
: "";

await addDoc(
collection(db,"articles"),
{

title,
shortDescription,
style,
category,

coverImage,
image1,
image2,
image3,

heading1,
paragraph1,

heading2,
paragraph2,

heading3,
paragraph3,

conclusion,
credits,

createdAt:new Date().toISOString()

}
);

document.getElementById("status").innerHTML =
"✅ Article Published";

});

</script>

</body>
