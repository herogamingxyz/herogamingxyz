<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Verse Games Admin Panel</title>

<style>

body{
background:#0f0f0f;
font-family:Arial,sans-serif;
margin:0;
padding:0;
color:white;
}

.container{
max-width:800px;
margin:50px auto;
padding:30px;
background:#1b1b1b;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,153,.2);
}

h1{
text-align:center;
color:#00ff99;
margin-bottom:30px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#00ff99;
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.02);
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Hero Verse Games Admin Panel</h1>

<label>Game Title</label>
<input type="text" id="title" placeholder="Enter Game Title">

<label>Main Game Image</label>
<input type="file" id="image1File" accept="image/*">

<label>Game Description</label>
<textarea id="description" placeholder="Game Description"></textarea>

<label>Second Image</label>
<input type="file" id="image2File" accept="image/*">

<label>Game Details</label>
<textarea id="details" placeholder="Game Details"></textarea>

<label>Third Image</label>
<input type="file" id="image3File" accept="image/*">

<label>Official Game Link</label>
<input
type="text"
id="download"
placeholder="Steam / Epic Games / Play Store Link">

<label>Developer</label>
<input type="text" id="developer" placeholder="Rockstar Games">

<label>Release Date</label>
<input type="text" id="releaseDate" placeholder="26 May 2026">

<label>Platform</label>
<input type="text" id="platform" placeholder="PC, PS5, Xbox">

<label>Genre</label>
<input type="text" id="genre" placeholder="Action, Adventure">

<label>Game Size</label>
<input type="text" id="size" placeholder="120 GB">

<label>Rating</label>
<input type="text" id="rating" placeholder="9.8/10">

<label>Badge</label>
<input type="text" id="badge" placeholder="NEW / TRENDING / AAA">

<label>Trailer Link</label>
<input type="text" id="trailer" placeholder="YouTube Trailer Link">

<label>Minimum Requirements</label>
<textarea id="minimumRequirements" placeholder="Minimum PC Requirements"></textarea>

<label>Recommended Requirements</label>
<textarea id="recommendedRequirements" placeholder="Recommended PC Requirements"></textarea>

<label>Credits</label>
<textarea id="credits" placeholder="Credits"></textarea>

<button id="publishBtn">
Publish Game
</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";
return;

}

if(user.email!=="herogamingxyzyt@gmail.com"){

alert("Access Denied");

window.location.href="index.html";
return;

}

});

async function uploadToImgBB(file){

const apiKey="4b1fc62b168482ae1cdd10329d4ed235";

const formData=new FormData();

formData.append("image",file);

const response=await fetch(
`https://api.imgbb.com/1/upload?key=${apiKey}`,
{
method:"POST",
body:formData
}
);

const data=await response.json();

return data.data.display_url;

}

document
.getElementById("publishBtn")
.addEventListener("click",async()=>{

const title=document.getElementById("title").value;

const image1File=document.getElementById("image1File").files[0];

const description=document.getElementById("description").value;

const image2File=document.getElementById("image2File").files[0];

const details=document.getElementById("details").value;

const image3File=document.getElementById("image3File").files[0];

const download=document.getElementById("download").value;

const developer =
document.getElementById("developer").value;

const releaseDate =
document.getElementById("releaseDate").value;

const platform =
document.getElementById("platform").value;

const genre =
document.getElementById("genre").value;

const size =
document.getElementById("size").value;

const rating =
document.getElementById("rating").value;

const badge =
document.getElementById("badge").value;

const trailer =
document.getElementById("trailer").value;

const minimumRequirements =
document.getElementById("minimumRequirements").value;

const recommendedRequirements =
document.getElementById("recommendedRequirements").value;

const credits=document.getElementById("credits").value;

if(!title||!description||!download){

alert("Fill Required Fields");

return;

  }

try{

const image1 =
image1File
? await uploadToImgBB(image1File)
: "";

const image2 =
image2File
? await uploadToImgBB(image2File)
: "";

const image3 =
image3File
? await uploadToImgBB(image3File)
: "";

await addDoc(
collection(db,"games"),
{

title:title,

image1:image1,

description:description,

image2:image2,

details:details,

image3:image3,

download:download,

credits:credits,

developer:developer,

releaseDate:releaseDate,

platform:platform,

genre:genre,

size:size,

rating:rating,

badge:badge,

trailer:trailer,

minimumRequirements:minimumRequirements,

recommendedRequirements:recommendedRequirements,

views:0,

downloads:75,

createdAt:new Date().toISOString()

}
);

document.getElementById("status").innerHTML =
"✅ Game Published Successfully";

document.getElementById("title").value="";

document.getElementById("image1File").value="";

document.getElementById("description").value="";

document.getElementById("image2File").value="";

document.getElementById("details").value="";

document.getElementById("image3File").value="";

document.getElementById("download").value="";

document.getElementById("credits").value="";

}
catch(error){

document.getElementById("status").innerHTML =
"❌ Error Publishing Game";

console.log(error);

}

});

</script>

</body>
</html>
