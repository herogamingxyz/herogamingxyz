<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Verse Admin Panel</title>

<style>

body{
background:#0f0f0f;
font-family:Arial,sans-serif;
color:white;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:60px auto;
background:#1b1b1b;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,153,0.2);
}

h1{
text-align:center;
color:#00ff99;
margin-bottom:30px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:15px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
transform:scale(1.02);
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
color:#00ff99;
}

</style>

</head>

<body>

<div class="container">

<h1>
🚀 Hero Verse Admin Panel
</h1>

<input
type="text"
id="title"
placeholder="Mod Title">

<textarea
id="description"
placeholder="Description"></textarea>

<input
type="text"
id="image"
placeholder="Image URL">

<input
type="text"
id="download"
placeholder="Download Link">

<input
type="text"
id="image2"
placeholder="Second Image URL">

<input
type="text"
id="image3"
placeholder="Third Image URL">

<input
type="text"
id="feature1"
placeholder="Feature 1">

<input
type="text"
id="feature2"
placeholder="Feature 2">

<input
type="text"
id="feature3"
placeholder="Feature 3">

<input
type="text"
id="download2"
placeholder="Second Download Link">

<input
type="text"
id="download3"
placeholder="Third Download Link">

<textarea
id="credits"
placeholder="Credits"></textarea>

<select id="category">

<option>BEDROCK</option>

<option>JAVA</option>

<option>PREMIUM</option>

<option>ARTICLE</option>

<option>PRODUCT</option>

</select>

<button id="publishBtn">

Publish Mod

</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",
authDomain: "hero-verse-67e33.firebaseapp.com",
projectId: "hero-verse-67e33",
storageBucket: "hero-verse-67e33.firebasestorage.app",
messagingSenderId: "227494840218",
appId: "1:227494840218:web:c0d0f311a6e75737eadc23"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("publishBtn")
.addEventListener("click", async()=>{

const title =
document.getElementById("title").value;

const description =
document.getElementById("description").value;

const image =
document.getElementById("image").value;

const download =
document.getElementById("download").value;

const category =
document.getElementById("category").value;

const image2 =
document.getElementById("image2").value;

const image3 =
document.getElementById("image3").value;

const feature1 =
document.getElementById("feature1").value;

const feature2 =
document.getElementById("feature2").value;

const feature3 =
document.getElementById("feature3").value;

const download2 =
document.getElementById("download2").value;

const download3 =
document.getElementById("download3").value;

const credits =
document.getElementById("credits").value;

if(
!title ||
!description ||
!image ||
!download
){

alert("Fill all fields");

return;

}

try{

await addDoc(
collection(db,"mods"),
{
title:title,
description:description,
image:image,
download:download,
category:category,
createdAt:new Date().toISOString()
image2:image2,
image3:image3,

feature1:feature1,
feature2:feature2,
feature3:feature3,

download2:download2,
download3:download3,

credits:credits,}
);

document.getElementById("status").innerHTML =
"✅ Mod Published Successfully";

document.getElementById("title").value = "";
document.getElementById("description").value = "";
document.getElementById("image").value = "";
document.getElementById("download").value = "";

}
catch(error){

document.getElementById("status").innerHTML =
"❌ Error Publishing Mod";

console.log(error);

}

});

</script>

</body>
</html>
