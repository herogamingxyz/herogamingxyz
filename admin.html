<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Verse Admin Panel</title>

<style>

body{
background:#0f0f0f;
font-family:Arial,sans-serif;
margin:0;
padding:0;
color:white;
}

.container{
max-width:800px;
margin:50px auto;
padding:30px;
background:#1b1b1b;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,153,0.2);
}

h1{
text-align:center;
color:#00ff99;
margin-bottom:30px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#00ff99;
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.02);
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>
🚀 Hero Verse Admin Panel V2
</h1>

<label>
Mod Title
</label>

<input
type="text"
id="title"
placeholder="Enter Mod Title">

<label>
Image 1 URL
</label>

<input
type="text"
id="image1"
placeholder="Top Image URL">

<label>
Description
</label>

<textarea
id="description"
placeholder="Mod Description"></textarea>

<label>
Image 2 URL
</label>

<input
type="text"
id="image2"
placeholder="Middle Image URL">

<label>
Installation Guide
</label>

<textarea
id="installation"
placeholder="Installation Guide"></textarea>

<label>
Image 3 URL
</label>

<input
type="text"
id="image3"
placeholder="Last Image URL">

<label>
Download Link
</label>

<input
type="text"
id="download"
placeholder="Download Link">

<label>
Credits
</label>

<textarea
id="credits"
placeholder="Credits"></textarea>

<button id="publishBtn">
Publish Mod
</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCcPC9jpeX5LfIvwB1OCCNHa4MAv3hVVJA",

authDomain:"hero-verse-67e33.firebaseapp.com",

projectId:"hero-verse-67e33",

storageBucket:"hero-verse-67e33.firebasestorage.app",

messagingSenderId:"227494840218",

appId:"1:227494840218:web:c0d0f311a6e75737eadc23"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document
.getElementById("publishBtn")
.addEventListener("click", async()=>{

const title =
document.getElementById("title").value;

const image1 =
document.getElementById("image1").value;

const description =
document.getElementById("description").value;

const image2 =
document.getElementById("image2").value;

const installation =
document.getElementById("installation").value;

const image3 =
document.getElementById("image3").value;

const download =
document.getElementById("download").value;

const credits =
document.getElementById("credits").value;

if(
!title ||
!image1 ||
!description ||
!download
){

alert("Fill Required Fields");

return;

}

try{

await addDoc(
collection(db,"mods"),
{

title:title,

image1:image1,

description:description,

image2:image2,

installation:installation,

image3:image3,

download:download,

credits:credits,

createdAt:new Date().toISOString()

}
);

document.getElementById("status").innerHTML =
"✅ Mod Published Successfully";

document.getElementById("title").value="";
document.getElementById("image1").value="";
document.getElementById("description").value="";
document.getElementById("image2").value="";
document.getElementById("installation").value="";
document.getElementById("image3").value="";
document.getElementById("download").value="";
document.getElementById("credits").value="";

}
catch(error){

document.getElementById("status").innerHTML =
"❌ Error Publishing Mod";

console.log(error);

}

});

  </script>

</body>
</html>
